<!-- home.html -->
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard - Pertemuan11</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .header-top {
            background: linear-gradient(90deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 20px 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .header-brand {
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header-brand i { font-size: 1.8rem; }
        .header-actions { display: flex; align-items: center; gap: 20px; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .logout-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid white;
            padding: 8px 16px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            cursor: pointer;
        }
        .logout-btn:hover {
            background: white;
            color: #2a5298;
        }
        .main-container { padding: 40px 20px; }
        .welcome-section {
            margin-bottom: 40px;
        }
        .welcome-title {
            font-size: 2rem;
            font-weight: 700;
            color: #1e3c72;
            margin-bottom: 10px;
        }
        .welcome-subtitle { color: #666; font-size: 1rem; }
        .profile-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            margin-bottom: 30px;
        }
        .info-card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .info-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 35px rgba(0,0,0,0.15);
        }
        .info-card-icon {
            font-size: 2rem;
            color: #2a5298;
            margin-bottom: 15px;
        }
        .info-card-label {
            color: #999;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .info-card-value {
            font-size: 1.5rem;
            color: #1e3c72;
            font-weight: 700;
            word-break: break-word;
        }
        .action-section {
            text-align: center;
            padding: 20px 0;
        }
        .action-section a {
            background: linear-gradient(90deg, #e74c3c 0%, #c0392b 100%);
            color: white;
            padding: 12px 28px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
            transition: all 0.3s;
        }
        .action-section a:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 15px rgba(231, 76, 60, 0.3);
        }
        @media (max-width: 768px) {
            .profile-grid { grid-template-columns: 1fr; }
            .welcome-title { font-size: 1.5rem; }
            .header-actions { flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body>

<div class="header-top">
    <div class="container-fluid">
        <div class="row align-items-center">
            <div class="col-md-6">
                <div class="header-brand">
                    <i class="fas fa-cube"></i>
                    <span>Pertemuan11</span>
                </div>
            </div>
            <div class="col-md-6">
                <div class="header-actions justify-content-end">
                    <div class="user-info">
                        <i class="fas fa-user-circle"></i>
                        <span th:text="${user.username}">User</span>
                    </div>
                    <a th:href="@{/logout}" class="logout-btn">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="main-container">
    <div class="container-fluid">
        <div class="welcome-section">
            <h1 class="welcome-title">Hello, <span th:text="${user.username}">User</span>! 👋</h1>
            <p class="welcome-subtitle">Here's your profile information at a glance</p>
        </div>

        <div class="profile-grid">
            <div class="info-card">
                <div class="info-card-icon">
                    <i class="fas fa-id-card"></i>
                </div>
                <div class="info-card-label">Full Name</div>
                <div class="info-card-value" th:text="${profile.nama}">Your Name</div>
            </div>

            <div class="info-card">
                <div class="info-card-icon">
                    <i class="fas fa-map-marker-alt"></i>
                </div>
                <div class="info-card-label">Address</div>
                <div class="info-card-value" th:text="${profile.alamat}">Your Address</div>
            </div>

            <div class="info-card">
                <div class="info-card-icon">
                    <i class="fas fa-user"></i>
                </div>
                <div class="info-card-label">Username</div>
                <div class="info-card-value" th:text="${user.username}">Username</div>
            </div>
        </div>

        <div class="action-section">
            <a th:href="@{/logout}">
                <i class="fas fa-door-open"></i> Sign Out
            </a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
