<!-- login.html -->
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - Pertemuan11</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container-auth { width: 100%; }
        .row-auth { display: flex; align-items: center; }
        .auth-banner {
            background: linear-gradient(180deg, rgba(255,255,255,.1) 0%, rgba(255,255,255,.05) 100%);
            color: white;
            padding: 60px 40px;
            border-radius: 20px 0 0 20px;
            backdrop-filter: blur(10px);
        }
        .auth-banner h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 20px; }
        .auth-banner p { font-size: 1.1rem; opacity: 0.9; line-height: 1.6; }
        .auth-form-box {
            background: white;
            padding: 50px 40px;
            border-radius: 0 20px 20px 0;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .form-title { font-size: 1.8rem; font-weight: 600; color: #333; margin-bottom: 10px; }
        .form-subtitle { color: #999; margin-bottom: 30px; font-size: 0.95rem; }
        .form-group {
            margin-bottom: 24px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            color: #444;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #f9f9f9;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        .divider { text-align: center; margin: 30px 0; position: relative; }
        .divider::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: #e0e0e0; }
        .divider span { position: relative; background: white; padding: 0 10px; color: #999; }
        .register-link { text-align: center; margin-top: 25px; }
        .register-link a { color: #667eea; font-weight: 600; text-decoration: none; transition: color 0.3s; }
        .register-link a:hover { color: #764ba2; }
        .register-text { color: #666; font-size: 0.95rem; }
        @media (max-width: 768px) {
            .auth-banner { border-radius: 20px 20px 0 0; padding: 40px 30px; }
            .auth-form-box { border-radius: 0 0 20px 20px; padding: 40px 30px; }
            .auth-banner h1 { font-size: 2rem; }
            .row-auth { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="container-auth">
    <div class="row-auth">
        <div class="col-lg-6 auth-banner">
            <h1>Welcome Back</h1>
            <p>Sign in to your account and start exploring. We're excited to have you here.</p>
        </div>

        <div class="col-lg-6 auth-form-box">
            <h2 class="form-title">Sign In</h2>
            <p class="form-subtitle">Enter your credentials to access your account</p>

            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label for="username"><i class="fas fa-user"></i> Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required>
                </div>

                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn-login">Sign In</button>
            </form>

            <div class="divider"><span>New here?</span></div>
            <div class="register-link">
                <p class="register-text">Don't have an account? <a th:href="@{/register}">Create one now</a></p>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
