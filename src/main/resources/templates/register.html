<!-- register.html -->
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register - Pertemuan11</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 50%, #006b9f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        .register-wrapper { width: 100%; max-width: 500px; }
        .register-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
            overflow: hidden;
        }
        .register-header {
            background: linear-gradient(135deg, rgba(0,212,255,0.95) 0%, rgba(0,107,159,0.95) 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        .register-header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .register-header p {
            font-size: 0.95rem;
            opacity: 0.95;
        }
        .register-body { padding: 40px 30px; }
        .form-section {
            margin-bottom: 28px;
            position: relative;
        }
        .form-section:last-child { margin-bottom: 0; }
        .section-divider {
            display: flex;
            align-items: center;
            margin: 30px 0;
            gap: 10px;
        }
        .section-divider::before,
        .section-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e0e0e0;
        }
        .section-divider-text {
            color: #999;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .form-group-wrapper.full { grid-template-columns: 1fr; }
        .form-group label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #0099cc;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            background: #f9fbfc;
            color: #333;
        }
        .form-group input::placeholder {
            color: #bbb;
            font-size: 0.9rem;
        }
        .form-group input:focus {
            outline: none;
            border-color: #00d4ff;
            background: white;
            box-shadow: 0 0 0 4px rgba(0, 212, 255, 0.1);
        }
        .btn-register {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 15px;
        }
        .btn-register:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(0, 212, 255, 0.3);
        }
        .btn-register:active {
            transform: translateY(-1px);
        }
        .form-footer {
            text-align: center;
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid #e0e0e0;
        }
        .form-footer-text {
            color: #666;
            font-size: 0.95rem;
        }
        .form-footer-link {
            color: #0099cc;
            font-weight: 700;
            text-decoration: none;
            transition: color 0.3s;
        }
        .form-footer-link:hover {
            color: #00d4ff;
        }
        .form-icon {
            color: #0099cc;
            margin-right: 6px;
            font-size: 0.9rem;
        }
        @media (max-width: 480px) {
            .form-group-wrapper { grid-template-columns: 1fr; }
            .register-header h1 { font-size: 1.5rem; }
            .register-body { padding: 30px 20px; }
            .register-header { padding: 30px 20px; }
        }
    </style>
</head>
<body>

<div class="register-wrapper">
    <div class="register-card">
        <div class="register-header">
            <h1><i class="fas fa-user-plus"></i> Join Us</h1>
            <p>Create your account and get started today</p>
        </div>

        <div class="register-body">
            <form th:action="@{/register}" method="post" th:object="${request}">
                <!-- Account Credentials Section -->
                <div class="form-section">
                    <div class="form-group-wrapper full">
                        <div class="form-group">
                            <label for="username">
                                <i class="fas fa-user form-icon"></i>Username
                            </label>
                            <input type="text" id="username" th:field="*{username}" placeholder="Choose a username" required>
                        </div>
                    </div>

                    <div class="form-group-wrapper full">
                        <div class="form-group">
                            <label for="password">
                                <i class="fas fa-lock form-icon"></i>Password
                            </label>
                            <input type="password" id="password" th:field="*{password}" placeholder="Create a secure password" required>
                        </div>
                    </div>
                </div>

                <!-- Personal Information Section -->
                <div class="section-divider">
                    <span class="section-divider-text">Personal Information</span>
                </div>

                <div class="form-section">
                    <div class="form-group-wrapper full">
                        <div class="form-group">
                            <label for="nama">
                                <i class="fas fa-id-card form-icon"></i>Full Name
                            </label>
                            <input type="text" id="nama" th:field="*{nama}" placeholder="Your full name" required>
                        </div>
                    </div>

                    <div class="form-group-wrapper full">
                        <div class="form-group">
                            <label for="alamat">
                                <i class="fas fa-map-marker-alt form-icon"></i>Address
                            </label>
                            <input type="text" id="alamat" th:field="*{alamat}" placeholder="Your address" required>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn-register">
                    <i class="fas fa-check-circle"></i> Create Account
                </button>
            </form>

            <div class="form-footer">
                <p class="form-footer-text">
                    Already have an account?
                    <a th:href="@{/login}" class="form-footer-link">Sign in here</a>
                </p>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
